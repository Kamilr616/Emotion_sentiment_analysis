name: Notebook quality

on:
  push:
    branches: [main, develop]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate notebook safety and syntax
        run: python scripts/validate_notebook.py
